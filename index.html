<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Entrega</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f4; display: flex; justify-content: center; }
        .container { max-width: 400px; width: 100%; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #075e54; text-align: center; }
        label { font-weight: bold; display: block; margin-top: 10px; color: #333; }
        input { width: 100%; padding: 12px; margin: 5px 0 15px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn-loc { background-color: #3498db; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; margin-top: 5px; margin-bottom: 15px; width: 100%; font-weight: bold; font-size: 14px; transition: 0.3s; }
        .btn-loc:disabled { background-color: #95a5a6; cursor: not-allowed; }
        button#enviar { width: 100%; padding: 15px; background-color: #25d366; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; margin-top: 10px; }
        button:hover { opacity: 0.9; }
        .status-loc { font-size: 12px; color: #27ae60; display: none; margin-bottom: 10px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>Dados para Entrega</h2>
    
    <label>Seu Nome:</label>
    <input type="text" id="nome" placeholder="Ex: Maria Silva" required>

    <label>Seu WhatsApp:</label>
    <input type="tel" id="whatsapp_cliente" placeholder="(00) 00000-0000" required>
    
    <label>Endereço Completo:</label>
    <input type="text" id="endereco" placeholder="Rua, número e bairro" required>
    
    <label>Ponto de Referência:</label>
    <input type="text" id="referencia" placeholder="Ex: Perto do mercado">

    <label>Localização GPS (Opcional):</label>
    <button id="btnGps" class="btn-loc" onclick="pegarLocalizacao()">📍 Enviar minha Localização Atual</button>
    <div id="status" class="status-loc">✅ Localização capturada com sucesso!</div>
    <input type="hidden" id="link_gps" value="Não enviado">

    <button id="enviar" onclick="enviarWhatsApp()">Finalizar e Enviar no WhatsApp</button>
</div>

<script>
    let carregandoGps = false;

    function pegarLocalizacao() {
        const btn = document.getElementById('btnGps');
        carregandoGps = true;
        btn.disabled = true;
        btn.innerText = "Buscando sinal do GPS... ⏳";

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                const urlGps = `https://www.google.com/maps?q=${lat},${lon}`;
                
                document.getElementById('link_gps').value = urlGps;
                document.getElementById('status').style.display = "block";
                
                carregandoGps = false;
                btn.disabled = false;
                btn.innerText = "📍 Localização Atualizada!";
                btn.style.backgroundColor = "#27ae60";
            }, function() {
                alert("Erro ao acessar GPS. Digite o endereço manualmente.");
                carregandoGps = false;
                btn.disabled = false;
                btn.innerText = "📍 Tentar Localização novamente";
            }, { enableHighAccuracy: true, timeout: 10000 });
        } else {
            alert("Seu navegador não suporta GPS.");
        }
    }

    function enviarWhatsApp() {
        if(carregandoGps) {
            alert("Aguarde um instante! Estamos terminando de pegar sua localização GPS...");
            return;
        }

        const nome = document.getElementById('nome').value;
        const zapCliente = document.getElementById('whatsapp_cliente').value;
        const endereco = document.getElementById('endereco').value;
        const referencia = document.getElementById('referencia').value;
        const linkGps = document.getElementById('link_gps').value;
        const meuNumero = "5581996625101"; 

        if(nome === "" || zapCliente === "" || endereco === "") {
            alert("Por favor, preencha Nome, WhatsApp e Endereço.");
            return;
        }

        const mensagem = `*NOVO PEDIDO DE ENTREGA*%0A%0A` +
                         `*Nome:* ${nome}%0A` +
                         `*WhatsApp:* ${zapCliente}%0A` +
                         `*Endereço:* ${endereco}%0A` +
                         `*Referência:* ${referencia}%0A` +
                         `*Localização GPS:* ${linkGps}`;

        const url = `https://api.whatsapp.com/send?phone=${meuNumero}&text=${mensagem}`;
        
        window.open(url, '_blank');
    }
</script>

</body>
</html>
