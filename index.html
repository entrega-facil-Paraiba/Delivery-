<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dados para Entrega</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            background-color: #f5f5f5;
            margin: 0;
        }

        .container { 
            max-width: 400px; 
            width: 100%; 
            background: white; 
            padding: 30px; 
            border-radius: 25px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); 
            text-align: center;
        }

        h2 { 
            color: #006b54; 
            margin-bottom: 25px;
            font-size: 26px;
        }

        label { 
            font-weight: bold; display: block; margin-top: 15px; 
            color: #333; text-align: left; font-size: 15px;
        }

        input { 
            width: 100%; padding: 15px; margin-top: 5px; 
            border: 2px solid #e0e0e0; border-radius: 12px; 
            box-sizing: border-box; font-size: 16px; 
            background-color: #fafafa;
        }

        /* Botão de Localização (Azul) */
        .btn-loc { 
            background-color: #3498db; 
            color: white; 
            border: none; 
            padding: 15px; 
            border-radius: 12px; 
            cursor: pointer; 
            margin-top: 10px; 
            width: 100%; 
            font-weight: bold;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* Botão Enviar (Verde) */
        .btn-enviar { 
            width: 100%; padding: 18px; 
            background-color: #2ecc71; color: white; 
            border: none; border-radius: 12px; 
            cursor: pointer; font-size: 18px; 
            font-weight: bold; margin-top: 30px;
            text-transform: uppercase;
        }

        #status-gps { 
            font-size: 13px; margin-top: 8px; font-weight: bold; display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Dados para Entrega</h2>
    
    <label>Seu Nome:</label>
    <input type="text" id="nome" placeholder="Ex: Maria Silva">

    <label>Seu WhatsApp:</label>
    <input type="tel" id="whatsapp_cliente" placeholder="(00) 00000-0000">
    
    <label>Endereço Completo:</label>
    <input type="text" id="endereco" placeholder="Rua, número e bairro">
    
    <label>Ponto de Referência:</label>
    <input type="text" id="referencia" placeholder="Ex: Perto do mercado">

    <label>Localização GPS (Opcional):</label>
    <button type="button" class="btn-loc" onclick="capturarLocalizacao()">
        <span id="txt-btn"> clique aqui pra eviar sua localização atual🛰️</span>
    </button>
    <div id="status-gps"></div>
    <input type="hidden" id="link_maps" value="Não informada">

    <button class="btn-enviar" onclick="enviarPedido()">Finalizar e Enviar no WhatsApp</button>
</div>

<script>
    function capturarLocalizacao() {
        const status = document.getElementById('status-gps');
        const btnTxt = document.getElementById('txt-btn');
        
        status.style.display = "block";
        status.style.color = "#3498db";
        status.innerText = "Buscando localização... ⏳";

        if (!navigator.geolocation) {
            alert("Seu navegador não suporta GPS.");
            return;
        }

        navigator.geolocation.getCurrentPosition(
            (posicao) => {
                const lat = posicao.coords.latitude;
                const lon = posicao.coords.longitude;
                // Cria o link curto do Google Maps
                const link = `https://www.google.com/maps?q=${lat},${lon}`;
                document.getElementById('link_maps').value = link;
                
                status.innerText = "✅ Localização capturada!";
                status.style.color = "#27ae60";
                btnTxt.innerText = "📍 Localização Atualizada!";
            },
            (erro) => {
                status.innerText = "❌ Ative o GPS do celular.";
                status.style.color = "#e74c3c";
                alert("Por favor, autorize o acesso à localização.");
            },
            { enableHighAccuracy: true, timeout: 10000 }
        );
    }

    function enviarPedido() {
        const nome = document.getElementById('nome').value;
        const zap = document.getElementById('whatsapp_cliente').value;
        const end = document.getElementById('endereco').value;
        const ref = document.getElementById('referencia').value;
        const gps = document.getElementById('link_maps').value;
        
        // Coloque seu número aqui (com DDD)
        const meuNumero = "5581996625101"; 

        if(!nome || !end) {
            alert("Por favor, preencha o Nome e o Endereço!");
            return;
        }

        const msg = `*DADOS PARA ENTREGA*%0A%0A*Cliente:* ${nome}%0A*WhatsApp:* ${zap}%0A*Endereço:* ${end}%0A*Referência:* ${ref}%0A*Localização GPS:* ${gps}`;
        window.open(`https://api.whatsapp.com/send?phone=${meuNumero}&text=${msg}`, '_blank');
    }
</script>

</body>
</html>
